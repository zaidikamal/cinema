<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Search</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
}

header{
padding:20px;
font-size:28px;
font-weight:bold;
}

.search-box{
margin:20px;
}

input{
padding:10px;
width:300px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#e50914;
color:white;
cursor:pointer;
}

.movies{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.movie{
background:#1e293b;
padding:10px;
border-radius:10px;
}

.movie img{
width:100%;
border-radius:10px;
}

.movie h3{
font-size:16px;
margin:10px 0;
}

</style>

</head>

<body>

<header>
🎬 Movie Explorer
</header>

<div class="search-box">

<input id="search" placeholder="Search movie...">

<button onclick="searchMovies()">Search</button>

</div>

<div class="movies" id="movies"></div>

<script>

const API_KEY="YOUR_API_KEY";

async function searchMovies(){

const query=document.getElementById("search").value;

const res=await fetch(
`https://www.omdbapi.com/?apikey=${API_KEY}&s=${query}`
);

const data=await res.json();

const container=document.getElementById("movies");

container.innerHTML="";

if(data.Search){

data.Search.forEach(movie=>{

container.innerHTML+=`

<div class="movie">

<img src="${movie.Poster}">

<h3>${movie.Title}</h3>

<p>${movie.Year}</p>

</div>

`;

});

}else{

container.innerHTML="<p>No movies found</p>";

}

}

</script>

</body>
</html>
